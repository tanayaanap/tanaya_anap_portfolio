{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Tanaya Anap Portfolio</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand fw-bold" href="/">
    Tanaya Anap
</a>

<button class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#nav">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="nav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/about/">About</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/projects/">Projects</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/resume/">Resume</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/contact/">Contact</a>
</li>

<button id="theme-toggle" class="theme-btn ms-3">
    🌙
</button>

</ul>

</div>

</div>

</nav>

<main class="content">

    {% if messages %}
        <div class="container mt-4" style="max-width: 600px;">
            {% for message in messages %}
                <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-danger{% endif %} alert-dismissible fade show text-center" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}
    {% endblock %}

</main>

<footer>
    © 2026 Tanaya Anap | Portfolio Website
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>

const toggle = document.getElementById("theme-toggle");

/* Load saved theme */

if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark-mode");
    toggle.innerHTML = "☀️";
}

/* Toggle Theme */

toggle.addEventListener("click",()=>{

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){

        localStorage.setItem("theme","dark");
        toggle.innerHTML = "☀️";

    }
    else{

        localStorage.setItem("theme","light");
        toggle.innerHTML = "🌙";

    }

});

</script>

</body>
</html>
