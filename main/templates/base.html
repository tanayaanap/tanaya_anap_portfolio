{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Tanaya Anap Portfolio</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">Tanaya Anap</a>

        <!-- Right side of navbar-brand: toggler + theme btn always visible -->
        <div class="d-flex align-items-center gap-2 d-lg-none">
            <button id="theme-toggle-mobile" class="theme-btn">🌙</button>
            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#nav"
                    aria-controls="nav"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>

        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/about/">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/projects/">Projects</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/resume/">Resume</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/contact/">Contact</a>
                </li>
                <!-- Theme toggle visible only on desktop -->
                <li class="nav-item d-none d-lg-flex align-items-center ms-2">
                    <button id="theme-toggle" class="theme-btn">🌙</button>
                </li>
            </ul>
        </div>

    </div>
</nav>

<main class="content">

    {% if messages %}
        <div class="container mt-4" style="max-width: 600px;">
            {% for message in messages %}
                <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-danger{% endif %} alert-dismissible fade show text-center" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}
    {% endblock %}

</main>

<footer>
    © 2026 Tanaya Anap | Portfolio Website
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>

    // Sync both toggle buttons (desktop + mobile)
    const toggleDesktop = document.getElementById("theme-toggle");
    const toggleMobile  = document.getElementById("theme-toggle-mobile");

    function applyTheme(isDark) {
        document.body.classList.toggle("dark-mode", isDark);
        const icon = isDark ? "☀️" : "🌙";
        if (toggleDesktop) toggleDesktop.innerHTML = icon;
        if (toggleMobile)  toggleMobile.innerHTML  = icon;
    }

    // Load saved theme on page load
    applyTheme(localStorage.getItem("theme") === "dark");

    function handleToggle() {
        const isDark = !document.body.classList.contains("dark-mode");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        applyTheme(isDark);
    }

    if (toggleDesktop) toggleDesktop.addEventListener("click", handleToggle);
    if (toggleMobile)  toggleMobile.addEventListener("click",  handleToggle);

</script>

</body>
</html>
